<svg width="100%" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title {
      font: bold 42px monospace;
      fill: #00F0FF;
      letter-spacing: 4px;
    }
    .subtitle {
      font: 16px monospace;
      fill: #00FFA6;
    }
    .glow {
      filter: url(#glow);
    }
  </style>

  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Animated background grid -->
  <g opacity="0.15">
    <path d="M0 50 H800 M0 100 H800 M0 150 H800" stroke="#00F0FF">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Title -->
  <text x="50%" y="90" text-anchor="middle" class="title glow">
    SYNCJARVIS
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </text>

  <!-- Subtitle -->
  <text x="50%" y="130" text-anchor="middle" class="subtitle">
    Autonomous Browser Agent • ReAct • LLM • Playwright
  </text>

  <!-- Scanning line -->
  <rect x="0" y="0" width="800" height="2" fill="#00F0FF">
    <animate attributeName="y" values="0;200;0" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>